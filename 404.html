<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 · 프레시밀크</title>
  <meta name="description" content="페이지를 찾을 수 없습니다." />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 24px;
    }
    .notfound {
      text-align: center;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      align-items: center;
    }
    .notfound__meta {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--signal);
      display: inline-flex; align-items: center; gap: 10px;
    }
    .notfound__code {
      font-size: clamp(96px, 18vw, 200px);
      font-weight: 200;
      letter-spacing: -0.04em;
      line-height: 0.9;
      color: var(--text);
      font-family: var(--font-sans);
    }
    .notfound__code em {
      font-style: normal;
      color: var(--signal);
    }
    .notfound__msg {
      color: var(--text-muted);
      font-size: 17px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main class="notfound">
    <span class="notfound__meta">
      <span class="dot dot--ideating dot--pulse" aria-hidden="true"></span>
      // EXP NOT FOUND · STATUS: MISSING
    </span>
    <h1 class="notfound__code">4<em>0</em>4</h1>
    <p class="notfound__msg">이 실험은 아직 존재하지 않거나, 시장이 폐기했어요.<br>홈으로 돌아가서 다른 실험을 보러 가요.</p>
    <a class="btn btn--primary" href="/">
      <span>홈으로 돌아가기</span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
  </main>
</body>
</html>
