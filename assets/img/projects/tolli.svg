<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="tolliBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAF3FF"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#tolliBg)"/>
  <!-- open book pages -->
  <g transform="translate(160,80)">
    <path d="M0 30 Q 160 0 320 30 L320 230 Q 160 200 0 230 Z" fill="#FFFFFF" stroke="#2684FF" stroke-width="2"/>
    <line x1="160" y1="15" x2="160" y2="215" stroke="#2684FF" stroke-width="2" stroke-dasharray="2 4"/>
    <!-- page lines left -->
    <g stroke="#C6DEFF" stroke-width="2" stroke-linecap="round">
      <line x1="30" y1="70" x2="130" y2="62"/>
      <line x1="30" y1="100" x2="130" y2="94"/>
      <line x1="30" y1="130" x2="130" y2="126"/>
      <line x1="30" y1="160" x2="110" y2="158"/>
    </g>
    <g stroke="#C6DEFF" stroke-width="2" stroke-linecap="round">
      <line x1="190" y1="62" x2="290" y2="70"/>
      <line x1="190" y1="94" x2="290" y2="100"/>
      <line x1="190" y1="126" x2="290" y2="130"/>
      <line x1="190" y1="158" x2="270" y2="160"/>
    </g>
  </g>
  <!-- progress dots (memorization cadence) -->
  <g transform="translate(160,330)">
    <circle cx="0" cy="0" r="6" fill="#2684FF"/>
    <circle cx="30" cy="0" r="6" fill="#2684FF"/>
    <circle cx="60" cy="0" r="6" fill="#2684FF"/>
    <circle cx="90" cy="0" r="6" fill="#FF2D87"/>
    <circle cx="120" cy="0" r="6" fill="#C6DEFF"/>
    <circle cx="150" cy="0" r="6" fill="#C6DEFF"/>
    <circle cx="180" cy="0" r="6" fill="#C6DEFF"/>
    <circle cx="210" cy="0" r="6" fill="#C6DEFF"/>
    <circle cx="240" cy="0" r="6" fill="#C6DEFF"/>
    <circle cx="270" cy="0" r="6" fill="#C6DEFF"/>
    <circle cx="300" cy="0" r="6" fill="#C6DEFF"/>
    <circle cx="330" cy="0" r="6" fill="#C6DEFF"/>
  </g>
</svg>
