<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="econBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF3FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#econBg)"/>
  <!-- ascending bars -->
  <g transform="translate(120,310)">
    <rect x="0"   y="-80"  width="40" height="80"  rx="6" fill="#C6DEFF"/>
    <rect x="60"  y="-130" width="40" height="130" rx="6" fill="#2684FF"/>
    <rect x="120" y="-180" width="40" height="180" rx="6" fill="#2684FF"/>
    <rect x="180" y="-220" width="40" height="220" rx="6" fill="#FF2D87"/>
    <rect x="240" y="-160" width="40" height="160" rx="6" fill="#2684FF"/>
    <rect x="300" y="-200" width="40" height="200" rx="6" fill="#2684FF"/>
  </g>
  <!-- ascending nodes line -->
  <g transform="translate(120,310)" fill="none" stroke="#FF2D87" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20,-100 80,-150 140,-200 200,-240 260,-180 320,-220"/>
  </g>
  <g transform="translate(120,310)" fill="#FF2D87">
    <circle cx="20"  cy="-100" r="6"/>
    <circle cx="80"  cy="-150" r="6"/>
    <circle cx="140" cy="-200" r="6"/>
    <circle cx="200" cy="-240" r="8"/>
    <circle cx="260" cy="-180" r="6"/>
    <circle cx="320" cy="-220" r="6"/>
  </g>
  <!-- coin -->
  <g transform="translate(480,90)">
    <circle r="44" fill="#FFFFFF" stroke="#FF2D87" stroke-width="3"/>
    <text y="15" text-anchor="middle" font-family="'Pretendard Variable',sans-serif" font-weight="700" font-size="42" fill="#FF2D87">&#x20A9;</text>
  </g>
</svg>
