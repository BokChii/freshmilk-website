<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="picktoryBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE5F0"/>
      <stop offset="100%" stop-color="#EAF3FF"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#picktoryBg)"/>
  <!-- stacked cards (prediction) -->
  <g transform="translate(200,80)">
    <rect x="20" y="20" width="200" height="260" rx="16" fill="#FFFFFF" stroke="#C6DEFF" stroke-width="2" transform="rotate(-8 120 150)"/>
    <rect x="20" y="20" width="200" height="260" rx="16" fill="#FFFFFF" stroke="#FFC2DA" stroke-width="2" transform="rotate(4 120 150)"/>
    <rect x="20" y="20" width="200" height="260" rx="16" fill="#FFFFFF" stroke="#2684FF" stroke-width="3"/>
    <!-- center card content: question mark -->
    <text x="120" y="200" text-anchor="middle" font-family="'Pretendard Variable',sans-serif" font-size="180" font-weight="200" fill="#2684FF" letter-spacing="-4">?</text>
    <!-- small heart pulse top right -->
    <path d="M260 60 a 14 14 0 0 1 24 -8 a 14 14 0 0 1 24 8 c 0 14 -24 28 -24 28 s -24 -14 -24 -28 z" fill="#FF2D87"/>
  </g>
</svg>
