<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="storitBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF3FF"/>
      <stop offset="100%" stop-color="#FFE5F0"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#storitBg)"/>
  <!-- webtoon panels stack -->
  <g transform="translate(80,60)">
    <rect x="0" y="0" width="180" height="120" rx="14" fill="#FFFFFF" stroke="#2684FF" stroke-width="2"/>
    <rect x="0" y="135" width="180" height="120" rx="14" fill="#FFFFFF" stroke="#2684FF" stroke-width="2"/>
    <line x1="20" y1="40" x2="120" y2="40" stroke="#C6DEFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="60" x2="100" y2="60" stroke="#C6DEFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="80" x2="140" y2="80" stroke="#C6DEFF" stroke-width="3" stroke-linecap="round"/>

    <line x1="20" y1="175" x2="120" y2="175" stroke="#FFC2DA" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="195" x2="100" y2="195" stroke="#FFC2DA" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="215" x2="140" y2="215" stroke="#FFC2DA" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- speech bubble Q -->
  <g transform="translate(370,80)">
    <circle cx="120" cy="120" r="110" fill="#FFFFFF" stroke="#FF2D87" stroke-width="3"/>
    <text x="120" y="158" text-anchor="middle" font-family="'Pretendard Variable',sans-serif" font-size="120" font-weight="600" fill="#FF2D87">Q</text>
    <path d="M55 200 L40 245 L85 220 Z" fill="#FFFFFF" stroke="#FF2D87" stroke-width="3"/>
  </g>
  <!-- echo rings -->
  <g fill="none" stroke="#2684FF" stroke-width="1.5" opacity="0.6">
    <circle cx="490" cy="200" r="148"/>
    <circle cx="490" cy="200" r="180"/>
  </g>
</svg>
